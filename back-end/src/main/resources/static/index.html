<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Korea Festivals</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- FullCalendar CSS (날짜 선택용) -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- 헤더 -->
  <nav class="navbar navbar-dark bg-dark py-3">
    <div class="container">
      <div class="d-flex align-items-center gap-3">
        <span class="navbar-brand fw-bold fs-4">🎉 Korea Festivals</span>
        <a href="/calendar.html" class="text-light text-decoration-none">📅 내 일정</a>
      </div>
      <div class="d-flex align-items-center gap-2">
        <!-- 언어 전환 버튼 -->
        <button id="lang-btn" class="btn btn-outline-light btn-sm" onclick="toggleLanguage()">English</button>
        <div id="auth-area">
          <!-- JS로 로그인 상태에 따라 채워짐 -->
        </div>
      </div>
    </div>
  </nav>

  <!-- 메인 -->
  <div class="container mt-4">

    <!-- 검색창 -->
    <form onsubmit="handleSearch(event)" class="mb-3">
      <div class="input-group">
        <input type="text" id="search-input" class="form-control" placeholder="축제 이름으로 검색...">
        <button class="btn btn-primary" type="submit">검색</button>
      </div>
    </form>

    <!-- 지역 필터 버튼 -->
    <div id="region-buttons" class="mb-3"></div>

    <!-- 결과 수 -->
    <p id="result-count" class="text-muted"></p>

    <!-- 축제 카드 목록 -->
    <div id="festival-grid" class="row row-cols-1 row-cols-md-3 g-4"></div>

    <!-- 페이지네이션 -->
    <div id="pagination" class="d-flex justify-content-center align-items-center gap-2 mt-4"></div>

  </div>

  <!-- 축제 상세 모달 -->
  <div class="modal fade" id="festivalModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-title">불러오는 중...</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer">
          <!-- JS로 로그인 상태에 따라 일정 저장 버튼 표시 -->
          <div id="modal-schedule-btn"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 날짜 선택 모달 (일정 저장할 때 달력으로 날짜 고르기) -->
  <div class="modal fade" id="schedulePickerModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="picker-title">날짜 선택</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted small mb-3">
            회색 배경이 축제 기간입니다. 달력에서 드래그하면 내 방문 날짜를 색칠할 수 있어요.
          </p>
          <div id="schedule-picker-calendar"></div>
          <div id="selected-date-info" class="mt-3 p-2 bg-light rounded text-center"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
          <button type="button" class="btn btn-primary" onclick="confirmSaveSchedule()">📅 저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 로그인/회원가입 모달 -->
  <div class="modal fade" id="authModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <ul class="nav nav-tabs w-100" id="auth-tabs">
            <li class="nav-item">
              <button class="nav-link active" onclick="switchTab('login', this)">로그인</button>
            </li>
            <li class="nav-item">
              <button class="nav-link" onclick="switchTab('signup', this)">회원가입</button>
            </li>
          </ul>
        </div>
        <div class="modal-body">
          <form id="auth-form" onsubmit="handleAuth(event)">
            <div class="mb-3">
              <label class="form-label">이메일</label>
              <input type="email" id="auth-email" class="form-control" placeholder="example@email.com" required>
            </div>
            <div class="mb-3">
              <label class="form-label">비밀번호</label>
              <input type="password" id="auth-password" class="form-control" placeholder="4자 이상" required>
            </div>
            <div class="mb-3" id="nickname-field" style="display: none">
              <label class="form-label">닉네임</label>
              <input type="text" id="auth-nickname" class="form-control" placeholder="2~20자">
            </div>
            <p id="auth-error" class="text-danger small"></p>
            <button type="submit" id="auth-submit" class="btn btn-primary w-100">로그인</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <footer class="text-center text-muted py-4 mt-5 border-top">
    데이터 제공: <strong>한국관광공사</strong>
  </footer>

  <!-- Bootstrap JS + 우리 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- FullCalendar JS (날짜 선택용) -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <script src="/js/main.js"></script>

</body>
</html>
