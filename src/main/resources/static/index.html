<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국 관광 가이드</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== 상단 네비게이션 (NOL 스타일: 로고 + 검색창 + 오른쪽 메뉴) ===== -->
<nav class="navbar">
    <div class="navbar-logo">
        <img src="images/logo.png" class="navbar-logo-img" alt="로고">
        <span id="nav-title">한국 관광 가이드</span>
    </div>

    <!-- 검색창 — 현재 보이는 관광지 목록을 이름으로 걸러줌 -->
    <div class="navbar-search">
        <input type="text" id="spot-search" placeholder="가고 싶은 곳을 검색해보세요"
               oninput="searchSpots(this.value)">
        <span class="navbar-search-ico">🔍</span>
    </div>

    <!-- 오른쪽: 언어 토글 + 로그인/마이 버튼 -->
    <div class="navbar-right">
        <div class="navbar-center">
            <button class="btn-lang active" id="btn-ko" onclick="setLang('ko')">🇰🇷</button>
            <button class="btn-lang" id="btn-en" onclick="setLang('en')">🇺🇸</button>
        </div>
        <!-- 축제 임박순 정렬 토글 (노브가 세로로 움직임) -->
        <label class="festival-toggle" title="오늘부터 가장 가까운 축제 순으로 정렬">
            <input type="checkbox" id="festival-sort-toggle" onchange="toggleFestivalSort()">
            <span class="festival-toggle-track"><span class="festival-toggle-knob"></span></span>
            <span class="festival-toggle-label" id="festival-sort-label">🎉 임박축제순</span>
        </label>
        <div class="nav-buttons" id="nav-buttons"></div>
    </div>
</nav>

<!-- ===== 2단 메뉴바 (NOL: 전체 카테고리 | 홈 | 티켓 ...) ===== -->
<div class="subnav">
    <div class="subnav-inner">
        <span class="subnav-all">☰ 전체 카테고리</span>
        <span class="subnav-divider"></span>
        <a class="subnav-item active" onclick="window.scrollTo({top:0, behavior:'smooth'})">홈</a>
        <a class="subnav-item" onclick="selectCategory('15', document.getElementById('cat-festival'))">🎉 축제</a>
        <a class="subnav-item" onclick="openCalendar()">📅 내 일정</a>
    </div>
</div>

<!-- ===== 메인 콘텐츠 ===== -->
<div class="main-content">

    <!-- 히어로 배너 캐러셀 (내용은 hero.js가 채움) -->
    <div class="hero-carousel">
        <button class="hero-arrow hero-prev" onclick="heroPrev()">‹</button>
        <div class="hero-slide" id="hero-slide"></div>
        <button class="hero-arrow hero-next" onclick="heroNext()">›</button>
        <div class="hero-indicator" id="hero-indicator">1 / 3</div>
    </div>

    <!-- 가입 안내 배너 -->
    <div class="promo-banner">
        <div class="promo-text">
            <strong>가입하고 여행 일정을 저장하세요!</strong>
            <span>관광지를 달력에 담아 나만의 여행 동선을 만들 수 있어요.</span>
        </div>
        <button class="promo-btn" onclick="openModal('login-modal')">로그인 / 가입하기 ›</button>
    </div>

    <!-- 카테고리 (NOL 스타일 동그란 아이콘) -->
    <div class="filter-section">
        <div class="section-label" id="section-category">무엇을 찾으세요?</div>
        <div class="cat-row">
            <button class="category-btn active" onclick="selectCategory('12', this)">
                <span class="cat-emoji">🏞️</span><span class="cat-label">관광지</span>
            </button>
            <button class="category-btn" onclick="selectCategory('14', this)">
                <span class="cat-emoji">🏛️</span><span class="cat-label">문화시설</span>
            </button>
            <button class="category-btn" id="cat-festival" onclick="selectCategory('15', this)">
                <span class="cat-emoji">🎉</span><span class="cat-label">축제</span>
            </button>
            <button class="category-btn" onclick="selectCategory('28', this)">
                <span class="cat-emoji">🏄</span><span class="cat-label">레포츠</span>
            </button>
            <button class="category-btn" onclick="selectCategory('32', this)">
                <span class="cat-emoji">🏨</span><span class="cat-label">숙박</span>
            </button>
            <button class="category-btn" onclick="selectCategory('38', this)">
                <span class="cat-emoji">🛍️</span><span class="cat-label">쇼핑</span>
            </button>
            <button class="category-btn" onclick="selectCategory('39', this)">
                <span class="cat-emoji">🍽️</span><span class="cat-label">음식점</span>
            </button>
        </div>
    </div>

    <!-- 지역 필터 -->
    <div class="filter-section">
        <div class="section-label" id="section-region">지역</div>
        <div class="filter-row">
            <button class="region-btn active" data-code="all" onclick="selectRegion('', 36.5, 127.5, this)">전체</button>
            <button class="region-btn" data-code="1"  onclick="selectRegion('1',  37.5665, 126.9780, this)">서울</button>
            <button class="region-btn" data-code="2"  onclick="selectRegion('2',  37.4563, 126.7052, this)">인천</button>
            <button class="region-btn" data-code="31" onclick="selectRegion('31', 37.4138, 127.5183, this)">경기</button>
            <button class="region-btn" data-code="32" onclick="selectRegion('32', 37.8228, 128.1555, this)">강원</button>
            <button class="region-btn" data-code="33" onclick="selectRegion('33', 36.8000, 127.7000, this)">충북</button>
            <button class="region-btn" data-code="34" onclick="selectRegion('34', 36.5184, 126.8000, this)">충남</button>
            <button class="region-btn" data-code="3"  onclick="selectRegion('3',  36.3504, 127.3845, this)">대전</button>
            <button class="region-btn" data-code="8"  onclick="selectRegion('8',  36.4800, 127.2890, this)">세종</button>
            <button class="region-btn" data-code="37" onclick="selectRegion('37', 35.7175, 127.1530, this)">전북</button>
            <button class="region-btn" data-code="38" onclick="selectRegion('38', 34.8679, 126.9910, this)">전남</button>
            <button class="region-btn" data-code="5"  onclick="selectRegion('5',  35.1595, 126.8526, this)">광주</button>
            <button class="region-btn" data-code="35" onclick="selectRegion('35', 36.4919, 128.8889, this)">경북</button>
            <button class="region-btn" data-code="36" onclick="selectRegion('36', 35.4606, 128.2132, this)">경남</button>
            <button class="region-btn" data-code="4"  onclick="selectRegion('4',  35.8714, 128.6014, this)">대구</button>
            <button class="region-btn" data-code="6"  onclick="selectRegion('6',  35.1796, 129.0756, this)">부산</button>
            <button class="region-btn" data-code="7"  onclick="selectRegion('7',  35.5384, 129.3114, this)">울산</button>
            <button class="region-btn" data-code="39" onclick="selectRegion('39', 33.4996, 126.5312, this)">제주</button>
        </div>
    </div>

    <!-- 지도 + 목록 -->
    <div class="container">
        <div id="map"></div>
        <div class="list-area">
            <div id="spot-list" class="spot-list">
                <p class="empty-msg">카테고리와 지역을 선택하세요.</p>
            </div>
            <div id="pagination" class="pagination"></div>
        </div>
    </div>
</div>

<!-- ===== 로그인 모달 ===== -->
<div class="modal-overlay" id="login-modal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('login-modal')">✕</button>
        <h2>로그인</h2>
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="login-username" placeholder="아이디를 입력하세요">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="login-password" placeholder="비밀번호를 입력하세요"
                   onkeydown="if(event.key==='Enter') submitLogin()">
        </div>
        <button class="form-submit" onclick="submitLogin()">로그인</button>
        <p class="form-msg" id="login-msg"></p>
        <p class="form-switch">계정이 없으신가요? <a onclick="switchModal('login-modal','signup-modal')">회원가입</a></p>
    </div>
</div>

<!-- ===== 회원가입 모달 ===== -->
<div class="modal-overlay" id="signup-modal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('signup-modal')">✕</button>
        <h2>회원가입</h2>
        <div class="form-group"><label>아이디</label><input type="text" id="signup-username" placeholder="사용할 아이디"></div>
        <div class="form-group"><label>비밀번호</label><input type="password" id="signup-password" placeholder="비밀번호 (6자 이상)"></div>
        <div class="form-group"><label>닉네임</label><input type="text" id="signup-nickname" placeholder="닉네임"></div>
        <div class="form-group"><label>이메일</label><input type="email" id="signup-email" placeholder="이메일 주소"></div>
        <button class="form-submit" onclick="submitSignup()">회원가입</button>
        <p class="form-msg" id="signup-msg"></p>
        <p class="form-switch">이미 계정이 있으신가요? <a onclick="switchModal('signup-modal','login-modal')">로그인</a></p>
    </div>
</div>

<!-- ===== 관광지 상세정보 모달 (카드 클릭 시 열림) ===== -->
<div class="modal-overlay" id="spot-info-modal">
    <div class="modal wide">
        <button class="modal-close" onclick="closeModal('spot-info-modal')">✕</button>
        <h2 id="info-title"></h2>
        <img id="info-img" class="info-img" src="">

        <!-- 기본 정보 (주소·전화·홈페이지) -->
        <div id="info-meta" class="info-meta"></div>

        <!-- 소개글 -->
        <div id="info-overview" class="info-overview" style="display:none;"></div>
    </div>
</div>

<!-- ===== 관광지 상세 모달 (리뷰 보기 클릭 시 열림) ===== -->
<div class="modal-overlay" id="detail-modal">
    <div class="modal wide">
        <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
        <h2 id="detail-title"></h2>
        <img id="detail-img" src=""
             style="width:100%;height:200px;object-fit:cover;border-radius:12px;margin-bottom:14px;display:block;">
        <p id="detail-addr"
           style="font-size:13px;color:var(--text-muted);margin-bottom:14px;display:flex;align-items:center;gap:6px;">
        </p>
        <button class="detail-navi-btn" onclick="openNaviFromDetail()">🚗 카카오맵 길찾기</button>

        <!-- 일정에 추가 버튼 -->
        <div style="margin-bottom:16px;">
            <button class="detail-sch-btn" onclick="openAddToSchedule()">📅 일정에 추가</button>
            <div id="add-to-sch-panel" style="display:none; margin-top:10px;">
                <div id="sch-select-list"></div>
            </div>
        </div>

        <!-- 소개글 + 홈페이지 (detail-info.js 에서 채워줌) -->
        <div id="detail-common-info" style="display:none;"></div>

        <!-- 축제 상세 정보 (축제 카테고리 선택 시 표시) -->
        <div id="detail-event-info" style="display:none;"></div>

        <p class="detail-section-title">💬 리뷰</p>
        <div id="review-list"></div>

        <div id="review-form-wrap">
            <p class="detail-section-title" style="margin-top:20px;">✏️ 리뷰 작성</p>
            <div class="form-group">
                <label>별점</label>
                <div class="star-select" id="star-select">
                    <span onclick="setRating(1)">★</span>
                    <span onclick="setRating(2)">★</span>
                    <span onclick="setRating(3)">★</span>
                    <span onclick="setRating(4)">★</span>
                    <span onclick="setRating(5)">★</span>
                </div>
            </div>
            <div class="form-group">
                <textarea id="review-content" placeholder="이 장소에 대한 솔직한 리뷰를 남겨주세요."></textarea>
            </div>
            <button class="form-submit" onclick="submitReview()">리뷰 등록</button>
            <p class="form-msg" id="review-msg"></p>
        </div>
    </div>
</div>

<!-- ===== 마이페이지 모달 ===== -->
<div class="modal-overlay" id="mypage-modal">
    <div class="modal wide">
        <button class="modal-close" onclick="closeModal('mypage-modal')">✕</button>
        <h2>마이페이지</h2>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('fav-tab', this)">❤️ 즐겨찾기</button>
            <button class="tab-btn" onclick="switchTab('review-tab', this)">💬 내 리뷰</button>
            <button class="tab-btn" onclick="switchTab('visit-tab', this)">📍 방문 기록</button>
        </div>
        <div id="fav-tab"><p class="empty-msg">불러오는 중...</p></div>
        <div id="review-tab" style="display:none"><p class="empty-msg">불러오는 중...</p></div>
        <div id="visit-tab" style="display:none"><p class="empty-msg">불러오는 중...</p></div>
    </div>
</div>

<!-- ===== 달력 모달 ===== -->
<div class="modal-overlay" id="calendar-modal">
    <div class="modal fullcal">
        <button class="modal-close" onclick="closeModal('calendar-modal')">✕</button>
        <h2>📅 내 여행 일정</h2>

        <!-- 달력 + 사이드 패널 레이아웃 -->
        <div class="cal-layout">

            <!-- FullCalendar가 그려질 영역 -->
            <div id="fc-calendar"></div>

            <!-- 날짜 클릭 시 나타나는 사이드 패널 -->
            <div class="cal-panel" id="cal-panel">
                <p class="cal-panel-hint">← 날짜를 클릭하면<br>일정이 표시됩니다.</p>
            </div>
        </div>
    </div>
</div>

<!-- ===== 스크립트 ===== -->
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=5f67f3a844e1fd36bf9c98082d434084"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/modal.js"></script>
<script src="js/auth.js"></script>
<script src="js/favorites.js"></script>
<script src="js/reviews.js"></script>
<script src="js/mypage.js"></script>
<script src="js/spot-info.js"></script>
<script src="js/detail-info.js"></script>
<script src="js/spots.js"></script>
<script src="js/calendar.js"></script>
<script src="js/hero.js"></script>
<script src="js/app.js"></script>

</body>
</html>
