<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한국 관광 가이드</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .event-info-box { background: #fffbf0; border: 1px solid #f0d98a; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; line-height: 2; color: #444; }
        .event-info-box p { margin: 0; }
    </style>
</head>
<body>

<!-- ===== 네비게이션 ===== -->
<nav class="navbar">
    <h1 id="nav-title">🗺️ 한국 관광 가이드</h1>
    <div style="display:flex;gap:10px;align-items:center;">
        <button class="nav-btn btn-lang active" id="btn-ko" onclick="setLang('ko')">🇰🇷 한국어</button>
        <button class="nav-btn btn-lang" id="btn-en" onclick="setLang('en')">🇺🇸 English</button>
    </div>
    <div class="nav-buttons" id="nav-buttons"></div>
</nav>

<!-- ===== 메인 콘텐츠 ===== -->
<div class="main-content">
    <p class="section-title" id="section-category">카테고리</p>
    <div class="category-buttons">
        <button class="category-btn active" onclick="selectCategory('12', this)">🏞️ 관광지</button>
        <button class="category-btn" onclick="selectCategory('14', this)">🏛️ 문화시설</button>
        <button class="category-btn" onclick="selectCategory('15', this)">🎉 축제</button>
        <button class="category-btn" onclick="selectCategory('28', this)">🏄 레포츠</button>
        <button class="category-btn" onclick="selectCategory('32', this)">🏨 숙박</button>
        <button class="category-btn" onclick="selectCategory('38', this)">🛍️ 쇼핑</button>
        <button class="category-btn" onclick="selectCategory('39', this)">🍽️ 음식점</button>
    </div>
    <p class="section-title" id="section-region">지역</p>
    <div class="region-buttons">
        <button class="region-btn" data-code="1"  onclick="selectRegion('1',  37.5665, 126.9780, this)">서울</button>
        <button class="region-btn" data-code="2"  onclick="selectRegion('2',  37.4563, 126.7052, this)">인천</button>
        <button class="region-btn" data-code="31" onclick="selectRegion('31', 37.4138, 127.5183, this)">경기</button>
        <button class="region-btn" data-code="32" onclick="selectRegion('32', 37.8228, 128.1555, this)">강원</button>
        <button class="region-btn" data-code="33" onclick="selectRegion('33', 36.8000, 127.7000, this)">충북</button>
        <button class="region-btn" data-code="34" onclick="selectRegion('34', 36.5184, 126.8000, this)">충남</button>
        <button class="region-btn" data-code="3"  onclick="selectRegion('3',  36.3504, 127.3845, this)">대전</button>
        <button class="region-btn" data-code="8"  onclick="selectRegion('8',  36.4800, 127.2890, this)">세종</button>
        <button class="region-btn" data-code="37" onclick="selectRegion('37', 35.7175, 127.1530, this)">전북</button>
        <button class="region-btn" data-code="38" onclick="selectRegion('38', 34.8679, 126.9910, this)">전남</button>
        <button class="region-btn" data-code="5"  onclick="selectRegion('5',  35.1595, 126.8526, this)">광주</button>
        <button class="region-btn" data-code="35" onclick="selectRegion('35', 36.4919, 128.8889, this)">경북</button>
        <button class="region-btn" data-code="36" onclick="selectRegion('36', 35.4606, 128.2132, this)">경남</button>
        <button class="region-btn" data-code="4"  onclick="selectRegion('4',  35.8714, 128.6014, this)">대구</button>
        <button class="region-btn" data-code="6"  onclick="selectRegion('6',  35.1796, 129.0756, this)">부산</button>
        <button class="region-btn" data-code="7"  onclick="selectRegion('7',  35.5384, 129.3114, this)">울산</button>
        <button class="region-btn" data-code="39" onclick="selectRegion('39', 33.4996, 126.5312, this)">제주</button>
    </div>
    <div class="container">
        <div id="map"></div>
        <div id="spot-list" class="spot-list">
            <p class="empty-msg">카테고리와 지역을 선택하세요.</p>
        </div>
    </div>
</div>

<!-- ===== 로그인 모달 ===== -->
<div class="modal-overlay" id="login-modal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('login-modal')">✕</button>
        <h2>로그인</h2>
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="login-username" placeholder="아이디">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="login-password" placeholder="비밀번호"
                   onkeydown="if(event.key==='Enter') submitLogin()">
        </div>
        <button class="form-submit" onclick="submitLogin()">로그인</button>
        <p class="form-msg" id="login-msg"></p>
        <p class="form-switch">계정이 없으신가요? <a onclick="switchModal('login-modal','signup-modal')">회원가입</a></p>
    </div>
</div>

<!-- ===== 회원가입 모달 ===== -->
<div class="modal-overlay" id="signup-modal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('signup-modal')">✕</button>
        <h2>회원가입</h2>
        <div class="form-group"><label>아이디</label><input type="text" id="signup-username" placeholder="아이디"></div>
        <div class="form-group"><label>비밀번호</label><input type="password" id="signup-password" placeholder="비밀번호"></div>
        <div class="form-group"><label>닉네임</label><input type="text" id="signup-nickname" placeholder="닉네임"></div>
        <div class="form-group"><label>이메일</label><input type="email" id="signup-email" placeholder="이메일"></div>
        <button class="form-submit" onclick="submitSignup()">회원가입</button>
        <p class="form-msg" id="signup-msg"></p>
        <p class="form-switch">이미 계정이 있으신가요? <a onclick="switchModal('signup-modal','login-modal')">로그인</a></p>
    </div>
</div>

<!-- ===== 관광지 상세 모달 ===== -->
<div class="modal-overlay" id="detail-modal">
    <div class="modal wide">
        <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
        <h2 id="detail-title"></h2>
        <img id="detail-img" src="" style="width:100%;height:180px;object-fit:cover;border-radius:8px;margin-bottom:12px;">
        <p id="detail-addr" style="color:#888;font-size:13px;margin-bottom:8px;"></p>
        <button class="card-btn btn-navi" style="width:100%;padding:10px;font-size:14px;margin-bottom:16px;"
                onclick="openNaviFromDetail()">🚗 카카오맵 길찾기</button>

        <!-- 축제 상세 정보 (축제 카테고리 선택 시 표시) -->
        <div id="detail-event-info" style="display:none;"></div>

        <!-- 리뷰 목록 -->
        <h3 style="font-size:15px;margin-bottom:10px;">💬 리뷰</h3>
        <div id="review-list"></div>

        <!-- 리뷰 작성 (로그인 시) -->
        <div id="review-form-wrap">
            <h3 style="font-size:15px;margin:16px 0 10px;">✏️ 리뷰 작성</h3>
            <div class="form-group">
                <label>별점</label>
                <div class="star-select" id="star-select">
                    <span onclick="setRating(1)">★</span>
                    <span onclick="setRating(2)">★</span>
                    <span onclick="setRating(3)">★</span>
                    <span onclick="setRating(4)">★</span>
                    <span onclick="setRating(5)">★</span>
                </div>
            </div>
            <div class="form-group">
                <textarea id="review-content" placeholder="리뷰를 작성해주세요."></textarea>
            </div>
            <button class="form-submit" onclick="submitReview()">리뷰 등록</button>
            <p class="form-msg" id="review-msg"></p>
        </div>
    </div>
</div>

<!-- ===== 마이페이지 모달 ===== -->
<div class="modal-overlay" id="mypage-modal">
    <div class="modal wide">
        <button class="modal-close" onclick="closeModal('mypage-modal')">✕</button>
        <h2>마이페이지</h2>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('fav-tab', this)">❤️ 즐겨찾기</button>
            <button class="tab-btn" onclick="switchTab('review-tab', this)">💬 내 리뷰</button>
            <button class="tab-btn" onclick="switchTab('visit-tab', this)">📍 방문 기록</button>
        </div>
        <div id="fav-tab"><p class="empty-msg">불러오는 중...</p></div>
        <div id="review-tab" style="display:none"><p class="empty-msg">불러오는 중...</p></div>
        <div id="visit-tab" style="display:none"><p class="empty-msg">불러오는 중...</p></div>
    </div>
</div>

<!-- ===== 스크립트 ===== -->
<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=5f67f3a844e1fd36bf9c98082d434084"></script>
<script src="js/i18n.js"></script>
<script src="js/modal.js"></script>
<script src="js/auth.js"></script>
<script src="js/favorites.js"></script>
<script src="js/reviews.js"></script>
<script src="js/mypage.js"></script>
<script src="js/spots.js"></script>
<script src="js/app.js"></script>

</body>
</html>
