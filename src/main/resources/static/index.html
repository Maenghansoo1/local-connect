<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한국 관광 가이드</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; background: #f5f5f5; }

        /* ===== 네비게이션 ===== */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            background: #fff; padding: 14px 30px;
            border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100;
        }
        .navbar h1 { margin: 0; font-size: 20px; color: #333; }
        .nav-buttons { display: flex; gap: 10px; align-items: center; }
        .nav-btn { padding: 8px 18px; font-size: 14px; border-radius: 6px; cursor: pointer; border: none; transition: background 0.2s; }
        .btn-login  { background: #fff; border: 1px solid #4a90e2; color: #4a90e2; }
        .btn-signup { background: #4a90e2; color: #fff; }
        .btn-logout { background: #fff; border: 1px solid #e74c3c; color: #e74c3c; }
        .btn-mypage { background: #fff; border: 1px solid #27ae60; color: #27ae60; }
        .btn-login:hover  { background: #eef4fd; }
        .btn-signup:hover { background: #357abd; }
        .btn-logout:hover { background: #fdf0ee; }
        .btn-mypage:hover { background: #eafaf1; }
        .user-info { font-size: 14px; color: #555; }
        .btn-lang { background: #fff; border: 1px solid #888; color: #555; font-weight: bold; }
        .btn-lang:hover { background: #f0f0f0; }
        .btn-lang.active { background: #333; color: #fff; border-color: #333; }

        /* ===== 메인 ===== */
        .main-content { padding: 20px; }
        .section-title { text-align: center; font-size: 13px; color: #888; margin-bottom: 8px; }
        .category-buttons, .region-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .category-btn { padding: 8px 18px; font-size: 14px; border: 2px solid #ddd; border-radius: 20px; background: #fff; cursor: pointer; transition: all 0.2s; }
        .category-btn:hover { border-color: #4a90e2; color: #4a90e2; }
        .category-btn.active { background: #4a90e2; border-color: #4a90e2; color: #fff; font-weight: bold; }
        .region-btn { padding: 7px 14px; font-size: 13px; border: 2px solid #ddd; border-radius: 20px; background: #fff; cursor: pointer; transition: all 0.2s; }
        .region-btn:hover { border-color: #ff6b35; color: #ff6b35; }
        .region-btn.active { background: #ff6b35; border-color: #ff6b35; color: #fff; font-weight: bold; }

        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        #map { width: 100%; height: 600px; border-radius: 8px; border: 1px solid #ddd; }
        .spot-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-height: 600px; overflow-y: auto; align-content: start; }

        /* ===== 카드 ===== */
        .spot-card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; background: #fff; cursor: pointer; transition: transform 0.2s; position: relative; }
        .spot-card:hover { transform: translateY(-3px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .spot-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; }
        .spot-card h3 { margin: 8px 0 4px; font-size: 14px; }
        .spot-card p  { margin: 0; font-size: 12px; color: #666; }
        .fav-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.9); border: none;
            border-radius: 50%; width: 30px; height: 30px;
            font-size: 16px; cursor: pointer; line-height: 30px; text-align: center;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }
        .fav-btn:hover { transform: scale(1.2); }
        .card-actions { display: flex; gap: 6px; margin-top: 8px; }
        .card-btn { flex: 1; padding: 5px; font-size: 12px; border-radius: 4px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; }
        .card-btn:hover { background: #eee; }
        .btn-navi { background: #fee500; border-color: #fee500; color: #333; font-weight: bold; }
        .btn-navi:hover { background: #fdd835; }
        .empty-msg { grid-column: 1 / -1; text-align: center; color: #aaa; padding: 40px 0; font-size: 14px; }

        /* ===== 모달 공통 ===== */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 36px 32px; width: 420px; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 30px rgba(0,0,0,0.15); position: relative; }
        .modal.wide { width: 560px; }
        .modal h2 { margin: 0 0 20px; font-size: 20px; text-align: center; color: #333; }
        .modal-close { position: absolute; top: 14px; right: 18px; background: none; border: none; font-size: 20px; cursor: pointer; color: #aaa; }
        .modal-close:hover { color: #333; }

        /* ===== 폼 ===== */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd;
            border-radius: 6px; font-size: 14px; outline: none; transition: border 0.2s; font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #4a90e2; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-submit { width: 100%; padding: 12px; background: #4a90e2; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; margin-top: 8px; }
        .form-submit:hover { background: #357abd; }
        .form-msg { text-align: center; font-size: 13px; margin-top: 10px; min-height: 18px; }
        .form-msg.error { color: #e74c3c; }
        .form-msg.success { color: #27ae60; }
        .form-switch { text-align: center; font-size: 13px; margin-top: 16px; color: #888; }
        .form-switch a { color: #4a90e2; cursor: pointer; text-decoration: underline; }

        /* ===== 탭 ===== */
        .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 16px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; font-size: 14px; color: #888; }
        .tab-btn.active { color: #4a90e2; border-bottom: 2px solid #4a90e2; margin-bottom: -2px; font-weight: bold; }

        /* ===== 리뷰 ===== */
        .review-item { border: 1px solid #eee; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .review-author { font-weight: bold; font-size: 13px; }
        .review-rating { color: #f39c12; font-size: 14px; }
        .review-content { font-size: 13px; color: #555; line-height: 1.5; }
        .review-date { font-size: 11px; color: #aaa; margin-top: 4px; }
        .review-delete { background: none; border: none; color: #e74c3c; font-size: 12px; cursor: pointer; }

        /* ===== 마이페이지 카드 ===== */
        .my-card { display: flex; gap: 12px; align-items: center; border: 1px solid #eee; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        .my-card img { width: 70px; height: 55px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        .my-card-info h4 { margin: 0 0 4px; font-size: 14px; }
        .my-card-info p { margin: 0; font-size: 12px; color: #888; }
        .my-card-del { margin-left: auto; background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 18px; }

        /* ===== 별점 ===== */
        .star-select { display: flex; gap: 4px; margin-top: 4px; }
        .star-select span { font-size: 24px; cursor: pointer; color: #ddd; }
        .star-select span.on { color: #f39c12; }
    </style>
</head>
<body>

<!-- ===== 네비게이션 ===== -->
<nav class="navbar">
    <h1 id="nav-title">🗺️ 한국 관광 가이드</h1>
    <div style="display:flex;gap:10px;align-items:center;">
        <button class="nav-btn btn-lang active" id="btn-ko" onclick="setLang('ko')">🇰🇷 한국어</button>
        <button class="nav-btn btn-lang" id="btn-en" onclick="setLang('en')">🇺🇸 English</button>
    </div>
    <div class="nav-buttons" id="nav-buttons"></div>
</nav>

<!-- ===== 메인 콘텐츠 ===== -->
<div class="main-content">
    <p class="section-title" id="section-category">카테고리</p>
    <div class="category-buttons">
        <button class="category-btn active" onclick="selectCategory('12', this)">🏞️ 관광지</button>
        <button class="category-btn" onclick="selectCategory('14', this)">🏛️ 문화시설</button>
        <button class="category-btn" onclick="selectCategory('15', this)">🎉 축제</button>
        <button class="category-btn" onclick="selectCategory('28', this)">🏄 레포츠</button>
        <button class="category-btn" onclick="selectCategory('32', this)">🏨 숙박</button>
        <button class="category-btn" onclick="selectCategory('38', this)">🛍️ 쇼핑</button>
        <button class="category-btn" onclick="selectCategory('39', this)">🍽️ 음식점</button>
    </div>
    <p class="section-title" id="section-region">지역</p>
    <div class="region-buttons">
        <button class="region-btn" data-code="1"  onclick="selectRegion('1',  37.5665, 126.9780, this)">서울</button>
        <button class="region-btn" data-code="2"  onclick="selectRegion('2',  37.4563, 126.7052, this)">인천</button>
        <button class="region-btn" data-code="31" onclick="selectRegion('31', 37.4138, 127.5183, this)">경기</button>
        <button class="region-btn" data-code="32" onclick="selectRegion('32', 37.8228, 128.1555, this)">강원</button>
        <button class="region-btn" data-code="33" onclick="selectRegion('33', 36.8000, 127.7000, this)">충북</button>
        <button class="region-btn" data-code="34" onclick="selectRegion('34', 36.5184, 126.8000, this)">충남</button>
        <button class="region-btn" data-code="3"  onclick="selectRegion('3',  36.3504, 127.3845, this)">대전</button>
        <button class="region-btn" data-code="8"  onclick="selectRegion('8',  36.4800, 127.2890, this)">세종</button>
        <button class="region-btn" data-code="37" onclick="selectRegion('37', 35.7175, 127.1530, this)">전북</button>
        <button class="region-btn" data-code="38" onclick="selectRegion('38', 34.8679, 126.9910, this)">전남</button>
        <button class="region-btn" data-code="5"  onclick="selectRegion('5',  35.1595, 126.8526, this)">광주</button>
        <button class="region-btn" data-code="35" onclick="selectRegion('35', 36.4919, 128.8889, this)">경북</button>
        <button class="region-btn" data-code="36" onclick="selectRegion('36', 35.4606, 128.2132, this)">경남</button>
        <button class="region-btn" data-code="4"  onclick="selectRegion('4',  35.8714, 128.6014, this)">대구</button>
        <button class="region-btn" data-code="6"  onclick="selectRegion('6',  35.1796, 129.0756, this)">부산</button>
        <button class="region-btn" data-code="7"  onclick="selectRegion('7',  35.5384, 129.3114, this)">울산</button>
        <button class="region-btn" data-code="39" onclick="selectRegion('39', 33.4996, 126.5312, this)">제주</button>
    </div>
    <div class="container">
        <div id="map"></div>
        <div id="spot-list" class="spot-list">
            <p class="empty-msg">카테고리와 지역을 선택하세요.</p>
        </div>
    </div>
</div>

<!-- ===== 로그인 모달 ===== -->
<div class="modal-overlay" id="login-modal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('login-modal')">✕</button>
        <h2>로그인</h2>
        <div class="form-group"><label>아이디</label><input type="text" id="login-username" placeholder="아이디"></div>
        <div class="form-group"><label>비밀번호</label><input type="password" id="login-password" placeholder="비밀번호" onkeydown="if(event.key==='Enter') submitLogin()"></div>
        <button class="form-submit" onclick="submitLogin()">로그인</button>
        <p class="form-msg" id="login-msg"></p>
        <p class="form-switch">계정이 없으신가요? <a onclick="switchModal('login-modal','signup-modal')">회원가입</a></p>
    </div>
</div>

<!-- ===== 회원가입 모달 ===== -->
<div class="modal-overlay" id="signup-modal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('signup-modal')">✕</button>
        <h2>회원가입</h2>
        <div class="form-group"><label>아이디</label><input type="text" id="signup-username" placeholder="아이디"></div>
        <div class="form-group"><label>비밀번호</label><input type="password" id="signup-password" placeholder="비밀번호"></div>
        <div class="form-group"><label>닉네임</label><input type="text" id="signup-nickname" placeholder="닉네임"></div>
        <div class="form-group"><label>이메일</label><input type="email" id="signup-email" placeholder="이메일"></div>
        <button class="form-submit" onclick="submitSignup()">회원가입</button>
        <p class="form-msg" id="signup-msg"></p>
        <p class="form-switch">이미 계정이 있으신가요? <a onclick="switchModal('signup-modal','login-modal')">로그인</a></p>
    </div>
</div>

<!-- ===== 관광지 상세 모달 (리뷰) ===== -->
<div class="modal-overlay" id="detail-modal">
    <div class="modal wide">
        <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
        <h2 id="detail-title"></h2>
        <img id="detail-img" src="" style="width:100%;height:180px;object-fit:cover;border-radius:8px;margin-bottom:16px;">
        <p id="detail-addr" style="color:#888;font-size:13px;margin-bottom:8px;"></p>
        <button id="detail-navi-btn" class="card-btn btn-navi" style="width:100%;padding:10px;font-size:14px;margin-bottom:16px;" onclick="openNaviFromDetail()">🚗 카카오맵 길찾기</button>

        <!-- 리뷰 목록 -->
        <h3 style="font-size:15px;margin-bottom:10px;">💬 리뷰</h3>
        <div id="review-list"></div>

        <!-- 리뷰 작성 (로그인 시) -->
        <div id="review-form-wrap">
            <h3 style="font-size:15px;margin:16px 0 10px;">✏️ 리뷰 작성</h3>
            <div class="form-group">
                <label>별점</label>
                <div class="star-select" id="star-select">
                    <span onclick="setRating(1)">★</span>
                    <span onclick="setRating(2)">★</span>
                    <span onclick="setRating(3)">★</span>
                    <span onclick="setRating(4)">★</span>
                    <span onclick="setRating(5)">★</span>
                </div>
            </div>
            <div class="form-group"><textarea id="review-content" placeholder="리뷰를 작성해주세요."></textarea></div>
            <button class="form-submit" onclick="submitReview()">리뷰 등록</button>
            <p class="form-msg" id="review-msg"></p>
        </div>
    </div>
</div>

<!-- ===== 마이페이지 모달 ===== -->
<div class="modal-overlay" id="mypage-modal">
    <div class="modal wide">
        <button class="modal-close" onclick="closeModal('mypage-modal')">✕</button>
        <h2>마이페이지</h2>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('fav-tab', this)">❤️ 즐겨찾기</button>
            <button class="tab-btn" onclick="switchTab('review-tab', this)">💬 내 리뷰</button>
            <button class="tab-btn" onclick="switchTab('visit-tab', this)">📍 방문 기록</button>
        </div>
        <div id="fav-tab"><p class="empty-msg">불러오는 중...</p></div>
        <div id="review-tab" style="display:none"><p class="empty-msg">불러오는 중...</p></div>
        <div id="visit-tab" style="display:none"><p class="empty-msg">불러오는 중...</p></div>
    </div>
</div>

<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=5f67f3a844e1fd36bf9c98082d434084"></script>
<script>
    // ===== 지도 =====
    const map = new kakao.maps.Map(document.getElementById('map'), {
        center: new kakao.maps.LatLng(36.5, 127.5), level: 13
    });
    let markers = [], infoWindows = [];
    let selectedCategory = '12', selectedRegion = null;
    let currentUser = null;
    let currentSpot = null;
    let selectedRating = 0;
    let currentLang = 'ko';

    // ===== 언어별 텍스트 =====
    const i18n = {
        ko: {
            title: '🗺️ 한국 관광 가이드',
            categoryLabel: '카테고리',
            regionLabel: '지역',
            categories: ['🏞️ 관광지','🏛️ 문화시설','🎉 축제','🏄 레포츠','🏨 숙박','🛍️ 쇼핑','🍽️ 음식점'],
            regions: { '1':'서울','2':'인천','31':'경기','32':'강원','33':'충북','34':'충남',
                       '3':'대전','8':'세종','37':'전북','38':'전남','5':'광주',
                       '35':'경북','36':'경남','4':'대구','6':'부산','7':'울산','39':'제주' },
            selectMsg: '카테고리와 지역을 선택하세요.',
            loading: '불러오는 중...',
            noData: '에 해당 정보가 없습니다.',
            noAddr: '주소 정보 없음',
            reviewBtn: '💬 리뷰 보기',
            naviBtn: '🚗 길찾기',
            login: '로그인', signup: '회원가입', logout: '로그아웃', mypage: '마이페이지',
        },
        en: {
            title: '🗺️ Korea Travel Guide',
            categoryLabel: 'Category',
            regionLabel: 'Region',
            categories: ['🏞️ Tourist Spots','🏛️ Culture','🎉 Festivals','🏄 Leisure','🏨 Stay','🛍️ Shopping','🍽️ Food'],
            regions: { '1':'Seoul','2':'Incheon','31':'Gyeonggi','32':'Gangwon','33':'Chungbuk','34':'Chungnam',
                       '3':'Daejeon','8':'Sejong','37':'Jeonbuk','38':'Jeonnam','5':'Gwangju',
                       '35':'Gyeongbuk','36':'Gyeongnam','4':'Daegu','6':'Busan','7':'Ulsan','39':'Jeju' },
            selectMsg: 'Please select a category and region.',
            loading: 'Loading...',
            noData: ' has no results.',
            noAddr: 'No address info',
            reviewBtn: '💬 Reviews',
            naviBtn: '🚗 Directions',
            login: 'Login', signup: 'Sign Up', logout: 'Logout', mypage: 'My Page',
        }
    };

    // ===== 언어 전환 =====
    function setLang(lang) {
        currentLang = lang;
        const t = i18n[lang];
        document.getElementById('nav-title').textContent = t.title;
        document.getElementById('section-category').textContent = t.categoryLabel;
        document.getElementById('section-region').textContent = t.regionLabel;
        document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');

        // 카테고리 버튼 텍스트 변경
        document.querySelectorAll('.category-btn').forEach((btn, i) => {
            btn.textContent = t.categories[i];
        });

        // 지역 버튼 텍스트 변경
        document.querySelectorAll('.region-btn').forEach(btn => {
            const code = btn.dataset.code;
            if (t.regions[code]) btn.textContent = t.regions[code];
        });

        // 네비바 업데이트
        updateNavbar(currentUser);

        // 지역이 선택된 상태면 다시 불러오기
        if (selectedRegion) loadSpots();
    }

    // ===== 카테고리/지역 =====
    function selectCategory(contentTypeId, btnEl) {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btnEl.classList.add('active');
        selectedCategory = contentTypeId;
        if (selectedRegion) loadSpots();
    }
    function selectRegion(areaCode, lat, lng, btnEl) {
        document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
        btnEl.classList.add('active');
        const regionName = i18n[currentLang].regions[areaCode] || areaCode;
        selectedRegion = { areaCode, regionName, lat, lng };
        map.setCenter(new kakao.maps.LatLng(lat, lng));
        map.setLevel(10);
        loadSpots();
    }

    // ===== 관광지 목록 =====
    function loadSpots() {
        const listEl = document.getElementById('spot-list');
        listEl.innerHTML = '<p class="empty-msg">불러오는 중...</p>';
        fetch(`/api/spots?areaCode=${selectedRegion.areaCode}&contentTypeId=${selectedCategory}&lang=${currentLang}`)
            .then(res => res.json())
            .then(data => {
                markers.forEach(m => m.setMap(null));
                markers = []; infoWindows = [];
                listEl.innerHTML = '';
                const items = data.response.body.items.item;
                if (!items || items.length === 0) {
                    listEl.innerHTML = `<p class="empty-msg">${selectedRegion.regionName}에 해당 정보가 없습니다.</p>`;
                    return;
                }
                items.forEach(spot => {
                    const card = document.createElement('div');
                    card.className = 'spot-card';
                    card.innerHTML = `
                        <img src="${spot.firstimage || 'https://via.placeholder.com/250x120?text=No+Image'}" alt="${spot.title}">
                        <button class="fav-btn" id="fav-${spot.contentid}" onclick="toggleFavorite(event, ${JSON.stringify(spot).replace(/"/g, '&quot;')})">🤍</button>
                        <h3>${spot.title}</h3>
                        <p>${spot.addr1 || '주소 정보 없음'}</p>
                        <div class="card-actions">
                            <button class="card-btn" onclick="openDetail(event, ${JSON.stringify(spot).replace(/"/g, '&quot;')})">${i18n[currentLang].reviewBtn}</button>
                            <button class="card-btn btn-navi" onclick="openNavi(event, '${spot.title}', ${spot.mapy}, ${spot.mapx})">${i18n[currentLang].naviBtn}</button>
                        </div>`;
                    listEl.appendChild(card);

                    // 즐겨찾기 상태 확인
                    if (currentUser) {
                        fetch(`/api/favorites/check?contentId=${spot.contentid}`)
                            .then(r => r.json())
                            .then(d => {
                                const btn = document.getElementById(`fav-${spot.contentid}`);
                                if (btn) btn.textContent = d.saved ? '❤️' : '🤍';
                            });
                    }

                    if (spot.mapx && spot.mapy) {
                        const position = new kakao.maps.LatLng(spot.mapy, spot.mapx);
                        const marker = new kakao.maps.Marker({ position, map, title: spot.title });
                        markers.push(marker);
                        const infoWindow = new kakao.maps.InfoWindow({
                            content: `<div style="padding:8px;font-size:13px;">${spot.title}</div>`
                        });
                        infoWindows.push(infoWindow);
                        kakao.maps.event.addListener(marker, 'click', () => {
                            infoWindows.forEach(iw => iw.close());
                            infoWindow.open(map, marker);
                        });
                        card.addEventListener('click', (e) => {
                            if (e.target.closest('.fav-btn') || e.target.closest('.card-actions')) return;
                            map.setCenter(position); map.setLevel(5);
                            infoWindows.forEach(iw => iw.close());
                            infoWindow.open(map, marker);
                            // 방문 기록 저장
                            if (currentUser) {
                                fetch('/api/visits', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        contentId: spot.contentid, title: spot.title,
                                        addr: spot.addr1 || '', image: spot.firstimage || ''
                                    })
                                });
                            }
                        });
                    }
                });
            })
            .catch(() => { listEl.innerHTML = '<p class="empty-msg">데이터를 불러오지 못했습니다.</p>'; });
    }

    // ===== 즐겨찾기 토글 =====
    function toggleFavorite(e, spot) {
        e.stopPropagation();
        if (!currentUser) { alert('로그인이 필요합니다.'); openModal('login-modal'); return; }
        fetch('/api/favorites/toggle', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contentId: spot.contentid, title: spot.title,
                addr: spot.addr1 || '', image: spot.firstimage || '',
                contentTypeId: selectedCategory,
                mapx: spot.mapx || '', mapy: spot.mapy || ''
            })
        })
        .then(r => r.json())
        .then(d => {
            const btn = document.getElementById(`fav-${spot.contentid}`);
            if (btn) btn.textContent = d.saved ? '❤️' : '🤍';
        });
    }

    // ===== 길찾기 =====
    function openNavi(e, title, lat, lng) {
        e.stopPropagation();
        if (!lat || !lng) { alert('해당 장소의 좌표 정보가 없습니다.'); return; }
        window.open(`https://map.kakao.com/link/to/${encodeURIComponent(title)},${lat},${lng}`, '_blank');
    }
    function openNaviFromDetail() {
        if (!currentSpot?.mapy || !currentSpot?.mapx) { alert('해당 장소의 좌표 정보가 없습니다.'); return; }
        window.open(`https://map.kakao.com/link/to/${encodeURIComponent(currentSpot.title)},${currentSpot.mapy},${currentSpot.mapx}`, '_blank');
    }

    // ===== 관광지 상세 (리뷰) =====
    function openDetail(e, spot) {
        e.stopPropagation();
        currentSpot = spot;
        document.getElementById('detail-title').textContent = spot.title;
        document.getElementById('detail-img').src = spot.firstimage || 'https://via.placeholder.com/500x180?text=No+Image';
        document.getElementById('detail-addr').textContent = spot.addr1 || '주소 정보 없음';
        document.getElementById('review-content').value = '';
        document.getElementById('review-msg').textContent = '';
        selectedRating = 0;
        updateStars(0);

        // 로그인 여부에 따라 작성폼 표시
        document.getElementById('review-form-wrap').style.display = currentUser ? 'block' : 'none';

        loadReviews(spot.contentid);
        openModal('detail-modal');
    }

    function loadReviews(contentId) {
        const listEl = document.getElementById('review-list');
        listEl.innerHTML = '<p style="color:#aaa;font-size:13px;">불러오는 중...</p>';
        fetch(`/api/reviews/spot/${contentId}`)
            .then(r => r.json())
            .then(reviews => {
                if (reviews.length === 0) {
                    listEl.innerHTML = '<p style="color:#aaa;font-size:13px;text-align:center;">아직 리뷰가 없습니다.</p>';
                    return;
                }
                listEl.innerHTML = reviews.map(r => `
                    <div class="review-item">
                        <div class="review-header">
                            <span class="review-author">${r.user.nickname || r.user.username}</span>
                            <span class="review-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                        </div>
                        <div class="review-content">${r.content}</div>
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <span class="review-date">${r.createdAt?.substring(0,10)}</span>
                            ${currentUser && currentUser === r.user.username
                                ? `<button class="review-delete" onclick="deleteReview(${r.id})">삭제</button>` : ''}
                        </div>
                    </div>`).join('');
            });
    }

    // ===== 별점 =====
    function setRating(val) { selectedRating = val; updateStars(val); }
    function updateStars(val) {
        document.querySelectorAll('#star-select span').forEach((s, i) => {
            s.classList.toggle('on', i < val);
        });
    }

    // ===== 리뷰 등록 =====
    function submitReview() {
        const content = document.getElementById('review-content').value.trim();
        const msgEl = document.getElementById('review-msg');
        if (!selectedRating) { msgEl.className = 'form-msg error'; msgEl.textContent = '별점을 선택해주세요.'; return; }
        if (!content) { msgEl.className = 'form-msg error'; msgEl.textContent = '리뷰 내용을 입력해주세요.'; return; }

        fetch('/api/reviews', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contentId: currentSpot.contentid,
                spotTitle: currentSpot.title,
                content, rating: String(selectedRating)
            })
        })
        .then(r => r.json())
        .then(d => {
            msgEl.className = 'form-msg success';
            msgEl.textContent = d.message;
            document.getElementById('review-content').value = '';
            selectedRating = 0; updateStars(0);
            loadReviews(currentSpot.contentid);
        });
    }

    // ===== 리뷰 삭제 =====
    function deleteReview(reviewId) {
        if (!confirm('리뷰를 삭제할까요?')) return;
        fetch(`/api/reviews/${reviewId}`, { method: 'DELETE' })
            .then(() => loadReviews(currentSpot.contentid));
    }

    // ===== 마이페이지 =====
    function openMypage() {
        openModal('mypage-modal');
        loadFavorites();
        loadMyReviews();
        loadVisitHistory();
        // 탭 초기화
        document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));
        document.getElementById('fav-tab').style.display = 'block';
        document.getElementById('review-tab').style.display = 'none';
        document.getElementById('visit-tab').style.display = 'none';
    }
    function switchTab(tabId, btnEl) {
        ['fav-tab','review-tab','visit-tab'].forEach(id => document.getElementById(id).style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        btnEl.classList.add('active');
    }

    function loadFavorites() {
        fetch('/api/favorites').then(r => r.json()).then(list => {
            const el = document.getElementById('fav-tab');
            if (!list.length) { el.innerHTML = '<p class="empty-msg">즐겨찾기가 없습니다.</p>'; return; }
            el.innerHTML = list.map(f => `
                <div class="my-card">
                    <img src="${f.image || 'https://via.placeholder.com/70x55?text=No'}" alt="${f.title}">
                    <div class="my-card-info"><h4>${f.title}</h4><p>${f.addr || '주소 없음'}</p></div>
                    <button class="my-card-del" onclick="removeFavorite('${f.contentId}', this.closest('.my-card'))">×</button>
                </div>`).join('');
        });
    }
    function removeFavorite(contentId, el) {
        fetch('/api/favorites/toggle', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contentId })
        }).then(() => el.remove());
    }

    function loadMyReviews() {
        fetch('/api/reviews/my').then(r => r.json()).then(list => {
            const el = document.getElementById('review-tab');
            if (!list.length) { el.innerHTML = '<p class="empty-msg">작성한 리뷰가 없습니다.</p>'; return; }
            el.innerHTML = list.map(r => `
                <div class="review-item">
                    <div class="review-header">
                        <span class="review-author">${r.spotTitle}</span>
                        <span class="review-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                    </div>
                    <div class="review-content">${r.content}</div>
                    <div style="display:flex;justify-content:space-between;">
                        <span class="review-date">${r.createdAt?.substring(0,10)}</span>
                        <button class="review-delete" onclick="deleteMyReview(${r.id}, this.closest('.review-item'))">삭제</button>
                    </div>
                </div>`).join('');
        });
    }
    function deleteMyReview(reviewId, el) {
        if (!confirm('리뷰를 삭제할까요?')) return;
        fetch(`/api/reviews/${reviewId}`, { method: 'DELETE' }).then(() => el.remove());
    }

    function loadVisitHistory() {
        fetch('/api/visits').then(r => r.json()).then(list => {
            const el = document.getElementById('visit-tab');
            if (!list.length) { el.innerHTML = '<p class="empty-msg">방문 기록이 없습니다.</p>'; return; }
            el.innerHTML = list.map(v => `
                <div class="my-card">
                    <img src="${v.image || 'https://via.placeholder.com/70x55?text=No'}" alt="${v.title}">
                    <div class="my-card-info"><h4>${v.title}</h4><p>${v.addr || '주소 없음'}</p><p style="color:#aaa;font-size:11px;">${v.visitedAt?.substring(0,10)}</p></div>
                </div>`).join('');
        });
    }

    // ===== 모달 =====
    function openModal(id) { document.getElementById(id).classList.add('show'); }
    function closeModal(id) {
        document.getElementById(id).classList.remove('show');
        const msgId = {  'login-modal': 'login-msg', 'signup-modal': 'signup-msg' }[id];
        if (msgId) document.getElementById(msgId).textContent = '';
    }
    function switchModal(from, to) { closeModal(from); openModal(to); }
    document.querySelectorAll('.modal-overlay').forEach(o => {
        o.addEventListener('click', e => { if (e.target === o) o.classList.remove('show'); });
    });

    // ===== 로그인 =====
    function submitLogin() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        const msgEl = document.getElementById('login-msg');
        if (!username || !password) { msgEl.className='form-msg error'; msgEl.textContent='아이디와 비밀번호를 입력하세요.'; return; }
        const form = new FormData();
        form.append('username', username); form.append('password', password);
        fetch('/api/auth/login', { method: 'POST', body: form })
            .then(r => r.json())
            .then(d => {
                if (d.username) { closeModal('login-modal'); updateNavbar(d.username); loadSpots(); }
                else { msgEl.className='form-msg error'; msgEl.textContent = d.message || '로그인 실패'; }
            });
    }

    // ===== 회원가입 =====
    function submitSignup() {
        const username = document.getElementById('signup-username').value.trim();
        const password = document.getElementById('signup-password').value;
        const nickname = document.getElementById('signup-nickname').value.trim();
        const email    = document.getElementById('signup-email').value.trim();
        const msgEl    = document.getElementById('signup-msg');
        if (!username||!password||!nickname||!email) { msgEl.className='form-msg error'; msgEl.textContent='모든 항목을 입력하세요.'; return; }
        fetch('/api/auth/signup', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, nickname, email })
        })
        .then(r => r.json())
        .then(d => {
            if (d.message === '회원가입이 완료되었습니다.') {
                msgEl.className='form-msg success'; msgEl.textContent='가입 완료! 로그인해주세요.';
                setTimeout(() => switchModal('signup-modal','login-modal'), 1500);
            } else { msgEl.className='form-msg error'; msgEl.textContent=d.message; }
        });
    }

    // ===== 로그아웃 =====
    function logout() {
        fetch('/api/auth/logout', { method: 'POST' }).then(() => { currentUser = null; updateNavbar(null); });
    }

    // ===== 네비게이션 업데이트 =====
    function updateNavbar(username) {
        currentUser = username;
        const nav = document.getElementById('nav-buttons');
        const t = i18n[currentLang];
        nav.innerHTML = username
            ? `<span class="user-info">👤 ${username}</span>
               <button class="nav-btn btn-mypage" onclick="openMypage()">${t.mypage}</button>
               <button class="nav-btn btn-logout" onclick="logout()">${t.logout}</button>`
            : `<button class="nav-btn btn-login" onclick="openModal('login-modal')">${t.login}</button>
               <button class="nav-btn btn-signup" onclick="openModal('signup-modal')">${t.signup}</button>`;
    }

    // ===== 초기 로그인 상태 확인 =====
    fetch('/api/auth/me')
        .then(r => r.ok ? r.json() : null)
        .then(d => updateNavbar(d ? d.username : null))
        .catch(() => updateNavbar(null));
</script>
</body>
</html>
